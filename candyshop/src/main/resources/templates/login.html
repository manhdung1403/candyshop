<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Candy Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fce4ec;
            height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 p-4 bg-white rounded shadow">
                <h3 class="text-center" style="color: #e91e63;">🍬 Candy Shop</h3>
                <h5 class="text-center text-muted mb-4">Đăng Nhập</h5>

                <div id="messageBox" class="alert d-none"></div>

                <form id="loginForm">
                    <div class="mb-3"><input type="text" id="username" class="form-control" placeholder="Tên đăng nhập"
                            required></div>
                    <div class="mb-3"><input type="password" id="password" class="form-control" placeholder="Mật khẩu"
                            required></div>
                    <button type="submit" class="btn w-100 text-white" style="background-color: #e91e63;">Đăng
                        Nhập</button>
                </form>
                <div class="text-center mt-3">Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const box = document.getElementById('messageBox');
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('candyUser', JSON.stringify({
                    userId: data.userId,
                    username: data.username,
                    roleId: data.roleId,
                    roleName: data.roleName
                }));
                box.className = 'alert alert-success';
                box.innerText = data.message || 'Đăng nhập thành công!';
                setTimeout(() => window.location.href = '/', 1000);
            } else {
                const msg = await res.text();
                box.className = 'alert alert-danger';
                box.innerText = msg;
            }
        };
    </script>
</body>

</html>
