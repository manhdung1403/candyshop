<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký - Candy Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { background-color: #fce4ec; height: 100vh; display: flex; align-items: center; } </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 p-4 bg-white rounded shadow">
            <h3 class="text-center" style="color: #e91e63;">🍬 Candy Shop</h3>
            <h5 class="text-center text-muted mb-4">Đăng Ký Tài Khoản</h5>
            
            <div id="messageBox" class="alert d-none"></div>

            <form id="registerForm">
                <div class="mb-3"><input type="text" id="username" class="form-control" placeholder="Tên đăng nhập" required></div>
                <div class="mb-3"><input type="email" id="email" class="form-control" placeholder="Email" required></div>
                <div class="mb-3"><input type="password" id="password" class="form-control" placeholder="Mật khẩu" required></div>
                <button type="submit" class="btn w-100 text-white" style="background-color: #e91e63;">Đăng Ký</button>
            </form>
            <div class="text-center mt-3">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });
        const msg = await res.text();
        const box = document.getElementById('messageBox');
        box.className = res.ok ? 'alert alert-success' : 'alert alert-danger';
        box.innerText = msg;
        if(res.ok) setTimeout(() => window.location.href = '/login', 1500);
    };
</script>
</body>
</html>
