<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa Hồ Sơ - Candy Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --candy-pink: #ff4d8d;
            --candy-purple: #b05cff;
            --candy-yellow: #ffd600;
            --candy-mint: #00c9a7;
            --bg-light: #fff5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: linear-gradient(135deg, #ff4d8d 0%, #b05cff 100%);
            padding: 14px 32px;
            box-shadow: 0 4px 20px rgba(255, 77, 141, 0.35);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .navbar-brand {
            font-family: 'Pacifico', cursive;
            font-size: 1.9rem;
            color: #fff !important;
            letter-spacing: 1px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.15);
        }

        .navbar-brand span {
            font-size: 1.6rem;
        }

        .navbar-text {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 700;
            font-size: 0.9rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== EDIT PROFILE CONTAINER ===== */
        .edit-profile-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        .edit-profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(255, 77, 141, 0.15);
            overflow: hidden;
            border: 2px solid rgba(255, 77, 141, 0.1);
        }

        .edit-profile-header {
            background: linear-gradient(135deg, #ff4d8d 0%, #b05cff 100%);
            padding: 40px 32px;
            color: white;
            text-align: center;
        }

        .edit-profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.5);
        }

        .edit-profile-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .edit-profile-subtitle {
            font-size: 0.9rem;
            opacity: 0.85;
        }

        .edit-profile-form {
            padding: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            color: #555;
            margin-bottom: 10px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label i {
            color: var(--candy-pink);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ffe0ef;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--candy-pink);
            box-shadow: 0 0 0 4px rgba(255, 77, 141, 0.1);
            background: rgba(255, 245, 249, 0.5);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
            color: #999;
        }

        .form-readonly {
            display: block;
            padding: 12px 16px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #666;
            font-weight: 600;
        }

        .form-text {
            font-size: 0.8rem;
            color: #999;
            margin-top: 6px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-submit {
            flex: 1;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--candy-pink), #b05cff);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 77, 141, 0.4);
            color: white;
            text-decoration: none;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-cancel {
            flex: 1;
            padding: 14px 24px;
            background: #f3e8ff;
            color: var(--candy-purple);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-cancel:hover {
            background: var(--candy-purple);
            color: white;
            transform: translateY(-2px);
            text-decoration: none;
        }

        /* ===== LOADING & MESSAGE ===== */
        .loading {
            text-align: center;
            padding: 60px 32px;
        }

        .spinner {
            border: 4px solid #f3e8ff;
            border-top: 4px solid var(--candy-purple);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert.show {
            display: flex;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .input-group-text {
            background: transparent;
            border: 2px solid #ffe0ef;
            cursor: pointer;
        }

        .form-control {
            border: 2px solid #ffe0ef;
            padding: 10px 12px;
        }

        .form-control:focus {
            border-color: var(--candy-pink);
            box-shadow: 0 0 0 0.2rem rgba(255, 77, 141, 0.25);
        }

        .change-password-link {
            text-align: right;
            margin-bottom: 20px;
        }

        .change-password-link a {
            color: var(--candy-pink);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .change-password-link a:hover {
            color: var(--candy-purple);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="d-flex align-items-center w-100 gap-3">
            <a class="navbar-brand" href="/home"><span>🍬</span> Candy Shop</a>
            <div class="ms-auto">
                <p class="navbar-text">
                    <i class="bi bi-pencil"></i> Chỉnh sửa hồ sơ
                </p>
            </div>
        </div>
    </nav>

    <!-- ===== EDIT PROFILE SECTION ===== -->
    <div class="edit-profile-container">
        <!-- Loading Box -->
        <div id="loadingBox" class="edit-profile-card">
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 16px; color: #888;">Đang tải thông tin...</p>
            </div>
        </div>

        <!-- Edit Form -->
        <div id="editBox" class="edit-profile-card" style="display: none;">
            <!-- Header -->
            <div class="edit-profile-header">
                <div class="edit-profile-avatar">
                    <i class="bi bi-person"></i>
                </div>
                <div class="edit-profile-title" id="editUsername">Người dùng</div>
                <div class="edit-profile-subtitle">Cập nhật thông tin cá nhân</div>
            </div>

            <!-- Form -->
            <div class="edit-profile-form">
                <!-- Alert Messages -->
                <div id="alert" class="alert"></div>

                <form id="editForm" onsubmit="submitForm(event)">
                    <!-- Username (Read-only) -->
                    <div class="form-group">
                        <label for="username">
                            <i class="bi bi-person-circle"></i> Tên đăng nhập
                        </label>
                        <input type="text" id="username" class="form-readonly" disabled>
                        <div class="form-text">Tên đăng nhập không thể thay đổi</div>
                    </div>

                    <!-- Email (Read-only) -->
                    <div class="form-group">
                        <label for="email">
                            <i class="bi bi-envelope"></i> Email
                        </label>
                        <input type="email" id="email" class="form-readonly" disabled>
                        <div class="form-text">Email không thể thay đổi</div>
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label for="phone">
                            <i class="bi bi-telephone"></i> Số điện thoại
                        </label>
                        <input type="tel" id="phone" placeholder="Nhập số điện thoại" maxlength="20">
                        <div class="form-text">VD: 0123456789 hoặc +84 123 456 789</div>
                    </div>

                    <!-- Address -->
                    <div class="form-group">
                        <label for="address">
                            <i class="bi bi-geo-alt"></i> Địa chỉ
                        </label>
                        <textarea id="address" placeholder="Nhập địa chỉ của bạn"></textarea>
                        <div class="form-text">Cập nhật địa chỉ để nhận hàng nhanh chóng</div>
                    </div>

                    <!-- Actions -->
                    <div class="form-actions">
                        <button type="submit" class="btn-submit" id="submitBtn">
                            <i class="bi bi-check-circle"></i> Lưu thay đổi
                        </button>
                        <a href="/profile" class="btn-cancel">
                            <i class="bi bi-x-circle"></i> Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Load user data
        async function loadEditProfile() {
            const loadingBox = document.getElementById('loadingBox');
            const editBox = document.getElementById('editBox');

            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) {
                    loadingBox.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <div style="color: #ff4d4d; font-size: 3rem; margin-bottom: 16px;">
                                <i class="bi bi-exclamation-circle"></i>
                            </div>
                            <p style="color: #555; font-size: 1.1rem; margin-bottom: 16px;">
                                Bạn chưa đăng nhập hoặc phiên đã hết hạn
                            </p>
                            <a href="/login" class="btn btn-primary" style="background: linear-gradient(135deg, #ff4d8d, #b05cff); border: none; border-radius: 12px; padding: 10px 24px; font-weight: 700;">
                                <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                            </a>
                        </div>
                    `;
                    return;
                }

                const user = await res.json();
                displayEditForm(user);
            } catch (err) {
                console.error('Error:', err);
                loadingBox.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <div style="color: #ff4d4d; font-size: 3rem; margin-bottom: 16px;">
                            <i class="bi bi-exclamation-triangle"></i>
                        </div>
                        <p style="color: #555; font-size: 1.1rem;">Lỗi khi tải thông tin</p>
                    </div>
                `;
            }
        }

        function displayEditForm(user) {
            const loadingBox = document.getElementById('loadingBox');
            const editBox = document.getElementById('editBox');

            // Hide loading, show form
            loadingBox.style.display = 'none';
            editBox.style.display = 'block';

            // Populate form
            document.getElementById('editUsername').textContent = user.username || 'Người dùng';
            document.getElementById('username').value = user.username || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('address').value = user.address || '';
        }

        // Submit form
        async function submitForm(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const alert = document.getElementById('alert');
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();

            // Basic validation
            if (!phone && !address) {
                showAlert('Vui lòng nhập ít nhất một thông tin để cập nhật', 'error');
                return;
            }

            if (phone && phone.length < 7) {
                showAlert('Số điện thoại không hợp lệ', 'error');
                return;
            }

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner" style="width: 16px; height: 16px; border-width: 2px; margin-right: 8px;"></span>Đang lưu...';

            try {
                const updateData = {
                    email: document.getElementById('email').value,
                    phone: phone,
                    address: address
                };

                const res = await fetch('/api/auth/update-profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updateData)
                });

                if (res.ok) {
                    const updatedUser = await res.json();
                    showAlert('Cập nhật hồ sơ thành công! Đang chuyển hướng...', 'success');
                    setTimeout(() => {
                        window.location.href = '/profile';
                    }, 1500);
                } else {
                    const errorMsg = await res.text();
                    showAlert(errorMsg || 'Lỗi khi cập nhật hồ sơ', 'error');
                }
            } catch (err) {
                console.error('Error:', err);
                showAlert('Lỗi mạng. Vui lòng thử lại.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Lưu thay đổi';
            }
        }

        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            const isSuccess = type === 'success';

            alert.className = `alert alert-${type} show`;
            alert.innerHTML = `
                <i class="bi ${isSuccess ? 'bi-check-circle-fill' : 'bi-exclamation-circle-fill'}"></i>
                <span>${message}</span>
            `;

            if (isSuccess) {
                setTimeout(() => {
                    alert.classList.remove('show');
                }, 4000);
            }
        }

        // Load on page load
        window.addEventListener('DOMContentLoaded', loadEditProfile);
    </script>
</body>

</html>
