<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng - Candy Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #fff5f9;
        }

        .navbar {
            background: linear-gradient(135deg, #ff4d8d 0%, #b05cff 100%);
            padding: 14px 32px;
            box-shadow: 0 4px 20px rgba(255, 77, 141, 0.35);
        }

        .navbar-brand {
            font-family: 'Pacifico', cursive;
            font-size: 1.9rem;
            color: #fff !important;
            letter-spacing: 1px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.15);
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: #fff;
            border-radius: 50px;
            padding: 7px 20px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.35);
            color: #fff;
        }

        .order-table {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(176, 92, 255, 0.1);
            padding: 24px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
        }

        .empty-state .emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 16px;
        }

        .toast-container {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
        }

        .toast-msg {
            background: #fff;
            border-left: 5px solid #ff4d8d;
            border-radius: 14px;
            padding: 16px 22px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            font-weight: 700;
            color: #333;
            animation: toastIn 0.4s ease;
        }

        .toast-msg.success {
            border-color: #00c9a7;
        }

        .toast-msg.error {
            border-color: #ff4d4d;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="d-flex align-items-center w-100 gap-3">
            <a class="navbar-brand" href="/home"><span>🍬</span> Candy Shop</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <a href="/home" class="btn-logout"><i class="bi bi-house"></i> Trang chủ</a>
                <a href="/cart" class="btn-logout"><i class="bi bi-cart3"></i> Giỏ hàng</a>
                <a href="/statistics" class="btn-logout"><i class="bi bi-bar-chart"></i> Thống kê</a>
                <a href="#" class="btn-logout" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="order-table" id="orderWrapper">
            <h2>Lịch sử đơn hàng</h2>
            <div id="adminUserFilter" style="display:none; margin-bottom:10px;">
                <input type="number" id="filterUserId" class="form-control"
                    placeholder="Nhập userId để xem đơn hàng của user">
                <button class="btn btn-primary mt-2" id="filterBtn">Xem đơn của user</button>
            </div>
            <div class="spinner-wrap" id="orderLoading">
                <div class="spinner-candy"></div>
            </div>
            <div id="orderContent"></div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function getCurrentUser() {
            try { return JSON.parse(localStorage.getItem('candyUser')) || null; } catch (e) { return null; }
        }
        function isAdminUser() {
            const user = getCurrentUser();
            return user ? user.roleId === 1 || String(user.roleName).toLowerCase() === 'admin' : false;
        }
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-msg ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
        function formatPrice(price) { return Number(price || 0).toLocaleString('vi-VN') + ' VNĐ'; }

        async function loadOrders() {
            const user = getCurrentUser();
            if (!user) { window.location.href = '/login'; return; }

            const adminUserFilter = document.getElementById('adminUserFilter');
            if (adminUserFilter) {
                adminUserFilter.style.display = isAdminUser() ? 'block' : 'none';
            }

            const apiUrl = `/api/orders?userId=${user.userId}`;
            const res = await fetch(apiUrl);
            if (!res.ok) {
                showToast('Không thể tải lịch sử đơn hàng.', 'error');
                return;
            }
            const orders = await res.json();
            renderOrders(orders);
        }

        function renderOrders(orders) {
            const content = document.getElementById('orderContent');
            document.getElementById('orderLoading').style.display = 'none';

            if (!orders || !orders.length) {
                content.innerHTML = `<div class="empty-state"><span class="emoji">📦</span><h4>Chưa có đơn hàng.</h4><p>Đặt hàng để xem lịch sử ở đây.</p></div>`;
                return;
            }

            content.innerHTML = orders.map(order => `
            <div class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title">Đơn #${order.orderId} - ${new Date(order.orderDate).toLocaleString('vi-VN')}</h5>
                    <p><strong>Người nhận:</strong> ${order.recipientName} - ${order.recipientPhone}</p>
                    <p><strong>Địa chỉ:</strong> ${order.recipientAddress}</p>
                    <p><strong>Ngày giao:</strong> ${order.deliveryDate ? new Date(order.deliveryDate).toLocaleDateString('vi-VN') : 'Chưa cập nhật'}</p>
                    <p><strong>Tổng tiền:</strong> ${formatPrice(order.totalAmount)}</p>
                    <div><strong>Chi tiết sản phẩm:</strong></div>
                    <ul>${order.items.map(i => `<li>${i.product.nameProduct} x${i.quantity} - ${formatPrice(i.subtotal)}</li>`).join('')}</ul>
                </div>
            </div>
        `).join('');
        }

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('candyUser'); window.location.href = '/login'; });

        const filterBtn = document.getElementById('filterBtn');
        if (filterBtn) {
            filterBtn.addEventListener('click', async () => {
                const user = getCurrentUser();
                if (!user || !isAdminUser()) return;
                const filterUserId = Number(document.getElementById('filterUserId').value);
                const targetParam = filterUserId ? `&targetUserId=${filterUserId}` : '';
                const res = await fetch(`/api/orders?userId=${user.userId}${targetParam}`);
                if (!res.ok) {
                    showToast('Không thể tải đơn hàng.', 'error');
                    return;
                }
                const orders = await res.json();
                renderOrders(orders);
            });
        }

        loadOrders();
    </script>
</body>

</html>
