<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🍬 CandyShop - Đăng ký</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #fff0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 24px rgba(233,30,140,0.15);
            text-align: center;
        }
        h2 { color: #e91e8c; margin-bottom: 8px; font-size: 1.8em; }
        p.sub { color: #999; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ffd6ea;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #e91e8c; }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e91e8c, #ff6b35);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            font-weight: bold;
        }
        .btn:hover { opacity: 0.9; }
        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .link { margin-top: 20px; font-size: 14px; color: #666; }
        .link a { color: #e91e8c; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🍬 CandyShop</h2>
        <p class="sub">Tạo tài khoản để bắt đầu mua sắm!</p>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form method="post" action="/register">
            <div class="form-group">
                <label>👤 Họ và tên</label>
                <input type="text" name="fullName" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label>🔒 Mật khẩu</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>📱 Số điện thoại</label>
                <input type="text" name="phone" placeholder="0901234567">
            </div>
            <button type="submit" class="btn">Đăng ký</button>
        </form>

        <div class="link">
            Đã có tài khoản? <a href="/login">Đăng nhập</a>
        </div>
    </div>
</body>
</html>
