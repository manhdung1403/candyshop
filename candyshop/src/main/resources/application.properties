# ===== KẾT NỐI SQL SERVER =====
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CandyShopDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=0944364247
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Nên tắt dòng dialect này để Spring Boot tự nhận diện phiên bản SQL Server phù hợp nhất
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.check-template-location=true

# ===== SERVER =====
server.port=8080