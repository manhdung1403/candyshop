<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Candy Shop 🍬</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-pink: #e91e63;
            --secondary-pink: #f06292;
            --bg-sweet: #fce4ec;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-sweet);
            background-image: 
                radial-gradient(at 0% 0%, hsla(340, 82%, 95%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(340, 82%, 90%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(340, 82%, 95%, 1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Hiệu ứng kẹo bay background */
        .candy-deco {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.3;
            z-index: 0;
            user-select: none;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }

        /* Card đăng ký */
        .register-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(233, 30, 99, 0.15);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-pink);
            margin-bottom: 0.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .input-group-text {
            background-color: white;
            border-right: none;
            color: var(--secondary-pink);
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 10px 15px;
            border-color: #eee;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #eee;
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.1);
            border-radius: 12px;
        }

        .btn-register {
            background: linear-gradient(45deg, var(--primary-pink), var(--secondary-pink));
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            color: white;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 8px 15px rgba(233, 30, 99, 0.3);
        }

        .login-link a {
            color: var(--primary-pink);
            text-decoration: none;
            font-weight: 700;
        }

        #togglePassword {
            cursor: pointer;
            border-radius: 0 12px 12px 0;
            border-left: none;
            background: white;
        }
    </style>
</head>

<body>
    <div class="candy-deco" style="top: 10%; left: 15%;">🧁</div>
    <div class="candy-deco" style="bottom: 15%; left: 10%; animation-delay: 1s;">🍩</div>
    <div class="candy-deco" style="top: 20%; right: 10%; animation-delay: 2s;">🍭</div>
    <div class="candy-deco" style="bottom: 20%; right: 15%; animation-delay: 1.5s;">🍬</div>

    <div class="register-card">
        <div class="text-center mb-4">
            <div class="brand-logo">🍬 Candy Shop</div>
            <h5 class="text-muted fw-bold">Tham Gia Cùng Chúng Tôi</h5>
        </div>

        <div id="messageBox" class="alert d-none py-2 small" style="border-radius: 10px;"></div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label text-uppercase">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-heart"></i></span>
                    <input type="text" id="username" class="form-control" placeholder="Ví dụ: keongot123" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-uppercase">Địa chỉ Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope-heart"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="email@vi-du.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-uppercase">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" style="border-right: none;" required>
                    <span class="input-group-text" id="togglePassword">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-register w-100 mb-3">
                Tạo Tài Khoản Ngay
            </button>
        </form>

        <div class="text-center login-link small">
            <span class="text-muted">Đã là thành viên?</span>
            <a href="/login">Đăng nhập tại đây</a>
        </div>
    </div>

    <script>
        // 1. Ẩn/Hiện mật khẩu
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('bi-eye');
            eyeIcon.classList.toggle('bi-eye-slash');
        });

        // 2. Xử lý Đăng ký
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const box = document.getElementById('messageBox');
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang tạo tài khoản...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('candyUser', JSON.stringify({
                        userId: data.userId,
                        username: data.username,
                        roleId: data.roleId,
                        roleName: data.roleName
                    }));
                    
                    box.className = 'alert alert-success d-block';
                    box.innerText = '🍬 Chúc mừng! Đăng ký thành công.';
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    const msg = await res.text();
                    box.className = 'alert alert-danger d-block';
                    box.innerText = msg || 'Có lỗi xảy ra, vui lòng thử lại.';
                    btn.innerHTML = 'Tạo Tài Khoản Ngay';
                    btn.disabled = false;
                }
            } catch (err) {
                box.className = 'alert alert-danger d-block';
                box.innerText = 'Lỗi kết nối server!';
                btn.innerHTML = 'Tạo Tài Khoản Ngay';
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
