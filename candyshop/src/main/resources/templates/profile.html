<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 Hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --candy-pink: #ff4d8d;
            --candy-purple: #b05cff;
            --bg-light: #fff5f9;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, #ff4d8d 0%, #b05cff 100%);
            padding: 14px 32px;
            box-shadow: 0 4px 20px rgba(255, 77, 141, 0.35);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .navbar-brand {
            font-family: 'Pacifico', cursive;
            font-size: 1.9rem;
            color: #fff !important;
            letter-spacing: 1px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.15);
            text-decoration: none;
        }

        .btn-pill {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: #fff;
            border-radius: 50px;
            padding: 7px 20px;
            font-weight: 800;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-pill:hover {
            background: rgba(255, 255, 255, 0.35);
            color: #fff;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 26px rgba(176, 92, 255, 0.12);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #ff4d8d, #b05cff);
            color: #fff;
            border: none;
            padding: 18px 22px;
            font-weight: 900;
        }

        .form-label {
            font-weight: 800;
            color: #555;
        }

        .form-control {
            border: 2px solid #ffe0ef;
            border-radius: 14px;
            padding: 10px 14px;
            font-weight: 700;
        }

        .form-control:focus {
            border-color: var(--candy-pink);
            box-shadow: 0 0 0 3px rgba(255, 77, 141, 0.15);
        }

        .btn-save {
            background: linear-gradient(135deg, #ff4d8d, #b05cff);
            border: none;
            border-radius: 50px;
            padding: 12px 18px;
            font-weight: 900;
            width: 100%;
            color: #fff;
        }

        .avatar-wrap {
            width: 140px;
            height: 140px;
            border-radius: 999px;
            overflow: hidden;
            background: #fff;
            border: 4px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 10px 26px rgba(176, 92, 255, 0.12);
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .kv-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 10px 0;
            border-bottom: 1px dashed #ffe0ef;
        }

        .kv-row:last-child {
            border-bottom: none;
        }

        .kv-key {
            font-weight: 900;
            color: #aaa;
        }

        .kv-val {
            font-weight: 900;
            color: #333;
            text-align: right;
            word-break: break-word;
        }

        .toast-container {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
        }

        .toast-msg {
            background: #fff;
            border-left: 5px solid var(--candy-pink);
            border-radius: 14px;
            padding: 16px 22px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            font-weight: 800;
            color: #333;
            animation: toastIn 0.4s ease;
            margin-top: 10px;
            max-width: 360px;
        }

        .toast-msg.success {
            border-color: #00c9a7;
        }

        .toast-msg.error {
            border-color: #ff4d4d;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="d-flex align-items-center w-100 gap-3">
            <a class="navbar-brand" href="/home"><span>🍬</span> Candy Shop</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <a href="/home" class="btn-pill"><i class="bi bi-house"></i> Trang chủ</a>
                <a href="/orders" class="btn-pill"><i class="bi bi-clock-history"></i> Lịch sử</a>
                <a href="/cart" class="btn-pill"><i class="bi bi-cart3"></i> Giỏ hàng</a>
                <a href="#" class="btn-pill" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container py-4" style="max-width: 920px;">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-circle"></i> Hồ sơ người dùng
            </div>
            <div class="card-body p-4">
                <div class="row g-4 align-items-start">
                    <div class="col-md-4 text-center">
                        <div class="mx-auto avatar-wrap">
                            <img id="avatarImg" src="" alt="Avatar">
                        </div>
                        <h4 class="mt-3 mb-2" id="displayUsername" style="font-weight:900;color:#333;">-</h4>
                        <div class="d-grid gap-2 mt-3">
                            <a class="btn-save text-decoration-none d-block" href="/editprofile">
                                <i class="bi bi-pencil-square"></i> Chỉnh sửa hồ sơ
                            </a>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="kv-row">
                            <span class="kv-key">User ID</span>
                            <span class="kv-val" id="userIdValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Tên đăng nhập</span>
                            <span class="kv-val" id="usernameValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Email</span>
                            <span class="kv-val" id="emailValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Số điện thoại</span>
                            <span class="kv-val" id="phoneValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Địa chỉ</span>
                            <span class="kv-val" id="addressValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Quyền</span>
                            <span class="kv-val" id="roleNameValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Role ID</span>
                            <span class="kv-val" id="roleIdValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Trạng thái</span>
                            <span class="kv-val" id="isActiveValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Avatar URL</span>
                            <span class="kv-val" id="avatarUrlValue">-</span>
                        </div>
                        <div class="kv-row">
                            <span class="kv-key">Ngày tạo</span>
                            <span class="kv-val" id="createdAtValue">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-msg ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function getCurrentUser() {
            try {
                return JSON.parse(localStorage.getItem('candyUser')) || null;
            } catch (e) {
                return null;
            }
        }

        async function loadProfile() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = '/login';
                return;
            }

            const res = await fetch(`/api/profile?userId=${user.userId}`);
            if (!res.ok) {
                const msg = await res.text();
                showToast(msg || 'Không tải được hồ sơ.', 'error');
                return;
            }

            const data = await res.json();
            document.getElementById('displayUsername').textContent = data.username || 'Khách';
            document.getElementById('userIdValue').textContent = data.userId ?? '-';
            document.getElementById('usernameValue').textContent = data.username || '-';
            document.getElementById('emailValue').textContent = data.email || '-';
            document.getElementById('phoneValue').textContent = data.phone || 'Chưa có';
            document.getElementById('addressValue').textContent = data.address || 'Chưa có';
            document.getElementById('roleNameValue').textContent = data.roleName || 'Chưa rõ';
            document.getElementById('roleIdValue').textContent = data.roleId ?? '-';
            document.getElementById('isActiveValue').textContent = data.isActive ? 'Đang hoạt động' : 'Tạm ngừng';
            document.getElementById('avatarUrlValue').textContent = data.avatarUrl || 'Chưa có';
            document.getElementById('createdAtValue').textContent = data.createdAt ? new Date(data.createdAt).toLocaleString('vi-VN') : '-';

            const defaultAvatar = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(
                `<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280">
                    <defs>
                        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                            <stop offset="0" stop-color="#ff4d8d"/>
                            <stop offset="1" stop-color="#b05cff"/>
                        </linearGradient>
                    </defs>
                    <rect width="280" height="280" rx="140" fill="#fff5f9"/>
                    <circle cx="140" cy="120" r="56" fill="url(#g)"/>
                    <rect x="60" y="170" width="160" height="88" rx="44" fill="url(#g)" opacity="0.95"/>
                 </svg>`
            );

            const avatarUrl = data.avatarUrl;
            const avatarImg = document.getElementById('avatarImg');
            if (!avatarUrl) {
                avatarImg.src = defaultAvatar;
            } else {
                if (avatarUrl.startsWith('http://') || avatarUrl.startsWith('https://')) {
                    avatarImg.src = avatarUrl;
                } else {
                    avatarImg.src = avatarUrl.startsWith('/') ? avatarUrl : '/' + avatarUrl;
                }
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('candyUser');
            window.location.href = '/login';
        });

        loadProfile();
    </script>
</body>

</html>
